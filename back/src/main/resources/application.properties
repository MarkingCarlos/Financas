# ================================================
# Finance Microservice - application.properties
# ================================================

spring.application.name=financas-api
server.port=8080



spring.datasource.url=jdbc:postgresql://localhost:5432/financas
spring.datasource.username=postgres
spring.datasource.password=admin


#Features utilizadas no desenvolvimento
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true


# ------------------------------------------------
# Segurança - JWT próprio + Google OAuth2
# ------------------------------------------------
app.security.enabled=true
app.jwt.secret=${JWT_SECRET:financas-chave-secreta-local-dev-troque-em-producao}
app.jwt.expiry-days=7
google.client-id=725147736433-q691rpubt26nn8fmcq0u1b10e2ispppt.apps.googleusercontent.com

# ------------------------------------------------
# Pluggy Open Finance
# ------------------------------------------------
pluggy.base-url=https://api.pluggy.ai
pluggy.client-id=${PLUGGY_CLIENT_ID:seu-client-id}
pluggy.client-secret=${PLUGGY_CLIENT_SECRET:seu-client-secret}
pluggy.webhook-url=${PLUGGY_WEBHOOK_URL:}

# ------------------------------------------------
# Actuator
# ------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------
# Logging
# ------------------------------------------------
logging.level.com.example.back=INFO
logging.level.org.springframework.security=WARN
