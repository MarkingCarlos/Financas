# ================================================
# Finance Microservice - application.properties
# ================================================

spring.application.name=financas-api
server.port=8080



spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/financas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}


#Features utilizadas no desenvolvimento
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true


# ------------------------------------------------
# Segurança - Google OAuth2
# Mude app.security.enabled para true em produção
# Configure seu Google Client ID abaixo
# ------------------------------------------------
app.security.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com
google.client-id=${GOOGLE_CLIENT_ID:}

# ------------------------------------------------
# Pluggy Open Finance
# ------------------------------------------------
pluggy.base-url=https://api.pluggy.ai
pluggy.client-id=${PLUGGY_CLIENT_ID:seu-client-id}
pluggy.client-secret=${PLUGGY_CLIENT_SECRET:seu-client-secret}
pluggy.webhook-url=${PLUGGY_WEBHOOK_URL:}

# ------------------------------------------------
# Actuator
# ------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------
# Logging
# ------------------------------------------------
logging.level.com.example.back=INFO
logging.level.org.springframework.security=WARN
