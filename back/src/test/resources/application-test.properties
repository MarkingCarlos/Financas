# ================================================
# Configurações de teste - usa H2 em memória
# ================================================

# H2 em memória com modo de compatibilidade PostgreSQL
spring.datasource.url=jdbc:h2:mem:financas_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Console H2 (útil para inspecionar dados em testes manuais)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desabilita a tentativa de conectar no Auth0 (issuer-uri)
# Os testes usam MockJwtDecoder via @MockBean
spring.security.oauth2.resourceserver.jwt.issuer-uri=
auth0.audience=https://financas-api-test

# Pluggy - não conecta em testes
pluggy.client-id=test-client-id
pluggy.client-secret=test-client-secret
pluggy.base-url=http://localhost:9999

logging.level.com.example.back=DEBUG
logging.level.org.springframework.security=WARN
